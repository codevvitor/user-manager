<h2 mat-dialog-title>
  {{ isEditing() ? 'Editar usuário' : 'Adicionar novo usuário' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form">

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Usuário (e-mail) *</mat-label>
      <input matInput formControlName="email" placeholder="Usuário (e-mail)">
      <mat-error>{{ emailError }}</mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Nome completo *</mat-label>
      <input matInput formControlName="name" placeholder="Nome completo">
      <mat-error>{{ nameError }}</mat-error>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="fill" class="half-width">
        <mat-label>CPF *</mat-label>
        <input matInput formControlName="cpf" placeholder="000.000.000-00">
        <mat-error>{{ cpfError }}</mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="half-width">
        <mat-label>Número do telefone *</mat-label>
        <input matInput formControlName="phone" placeholder="Número do telefone">
        <mat-error>{{ phoneError }}</mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="phone-type">
        <mat-select formControlName="phoneType">
          <mat-option value="CELULAR">CELULAR</mat-option>
          <mat-option value="FIXO">FIXO</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <p class="sms-info">
      O usuário receberá uma senha provisória para acesso ao sistema por SMS.
    </p>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="start">
  <button mat-flat-button color="primary"
    [disabled]="form.invalid || loading()"
    (click)="onSubmit()">
    @if (loading()) {
      <mat-spinner diameter="20" />
    } @else {
      SALVAR
    }
  </button>
  <button mat-button (click)="onCancel()">CANCELAR</button>
</mat-dialog-actions>
